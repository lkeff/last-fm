version: '3.9'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  last-fm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: last-fm-prod
    image: last-fm:production
    restart: always
    
    # Environment variables (set these in your environment or use secrets)
    environment:
      NODE_ENV: production
      LASTFM_API_KEY: ${LASTFM_API_KEY}
      FREESOUND_API_KEY: ${FREESOUND_API_KEY:-}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_CACHE: ${ENABLE_CACHE:-true}
      CACHE_TTL: ${CACHE_TTL:-3600}
    
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    
    # Temporary filesystems for writable directories
    tmpfs:
      - /tmp:mode=1777,size=100m
      - /app/.npm:mode=0755,size=50m
    
    # Persistent volumes
    volumes:
      - last-fm-data:/app/data
      - last-fm-logs:/app/logs
    
    # Network configuration
    networks:
      - last-fm-network
    
    # Port binding (localhost only for security)
    ports:
      - "127.0.0.1:3000:3000"
    
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "production"

  # Optional: Nginx reverse proxy for HTTPS
  nginx:
    image: nginx:alpine
    container_name: last-fm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - last-fm-network
    depends_on:
      - last-fm
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  last-fm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  last-fm-data:
    driver: local
  last-fm-logs:
    driver: local
  nginx-cache:
    driver: local
