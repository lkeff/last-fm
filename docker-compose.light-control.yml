version: '3.9'

# Light Control Service Docker Compose Configuration
# Professional DMX512/Art-Net/sACN lighting control system
# Usage: docker-compose -f docker-compose.light-control.yml up -d

services:
  light-control:
    image: light-control:1.0.0
    container_name: light-control-service
    restart: always
    
    # Environment variables
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      UNIVERSES: 8
      ENABLE_ARTNET: 'true'
      ENABLE_SACN: 'true'
      ENABLE_RDM: 'true'
    
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    
    # Temporary filesystems for writable directories
    tmpfs:
      - /tmp:mode=1777,size=100m
      - /app/.npm:mode=0755,size=50m
    
    # Persistent volumes for logs and data
    volumes:
      - light-control-logs:/app/logs
      - light-control-data:/app/data
    
    # Network configuration
    networks:
      - light-control-network
    
    # Port binding
    ports:
      - "127.0.0.1:3001:3001"
      - "6454:6454/udp"  # Art-Net
      - "5568:5568/udp"  # sACN
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "light-control"

  # Optional: Nginx reverse proxy for HTTPS and load balancing
  nginx-light:
    image: nginx:alpine
    container_name: light-control-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/light-control.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-light-cache:/var/cache/nginx
    networks:
      - light-control-network
    depends_on:
      - light-control
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Optional: Prometheus for monitoring
  prometheus-light:
    image: prom/prometheus:latest
    container_name: light-control-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus-light.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-light-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - light-control-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  light-control-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  light-control-logs:
    driver: local
  light-control-data:
    driver: local
  nginx-light-cache:
    driver: local
  prometheus-light-data:
    driver: local
