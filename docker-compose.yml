version: '3.9'

services:
  last-fm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: last-fm
    image: last-fm:latest
    restart: unless-stopped
    # SECURITY: Use environment variables instead of .env file
    # Set these before running: export LASTFM_API_KEY=your_key
    environment:
      NODE_ENV: production
      LASTFM_API_KEY: ${LASTFM_API_KEY}
      FREESOUND_API_KEY: ${FREESOUND_API_KEY:-}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # SECURITY: Hardening options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /app/.npm
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - app-network
    # SECURITY: Bind to localhost only (use reverse proxy for external access)
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/lastfm/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    command: pnpm start:server
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    develop:
      watch:
        - action: sync
          path: ./
          target: /app
          ignore:
            - node_modules
            - .git
            - dist
            - logs
        - action: rebuild
          path: ./package.json

  ramdac-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ramdac-test
    image: last-fm:latest
    environment:
      NODE_ENV: test
    networks:
      - app-network
    command: node test/ramdac.test.js
    profiles:
      - test

networks:
  app-network:
    driver: bridge
