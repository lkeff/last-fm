version: '3.9'

services:
  last-fm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: last-fm
    image: last-fm:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - app-network
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules
        - action: rebuild
          path: ./package.json

networks:
  app-network:
    driver: bridge
